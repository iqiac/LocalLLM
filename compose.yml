# This runs on NixOs
services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    hostname: ollama
    ports:
      - 11434:11434
    environment:
      NVIDIA_VISIBLE_DEVICES: all
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    devices:
      - nvidia.com/gpu=all
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: cdi
    #           device_ids:
    #             - nvidia.com/gpu=all
    #           capabilities: [gpu]

  webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    depends_on:
      - ollama
    ports:
      - 3000:8080
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=False
    restart: unless-stopped
    volumes:
      - open-webui-data:/app/backend/data

volumes:
  ollama-data:
  open-webui-data:
